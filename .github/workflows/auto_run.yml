name: Auto Update M&E Dashboard Data

on:
  push:
    paths:
      - 'NGO_Project_MNE_Dataset_2000.xlsx'
  workflow_dispatch: # Allows you to manually trigger updates with a single click button

jobs:
  build-and-refresh:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository files
      uses: actions/checkout@v4

    - name: Set up cloud Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # ✅ Fixed the key name

    - name: Install required libraries
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl matplotlib

    - name: Install required libraries
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl matplotlib requests

    - name: Run data automation pipeline script
      env:
        
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_ANON_PUBLIC_KEY: ${{ secrets.SUPABASE_ANON_PUBLIC_KEY }}

      run: python update_dashboard.py
      
    - name: Commit and push updated chart back to dashboard
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        # Track ALL changes (both your chart image AND your newly written README.md)
        git add -A
        
        git diff-index --quiet HEAD || git commit -m "🤖 Auto-updated dashboard metrics [Skip CI]"
        
        git pull --rebase origin main
        git push origin main
