name: Auto-Update Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'NGO_Project_MNE_Dataset_2000.xlsx'
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl matplotlib python-dotenv python-dateutil
      
      - name: Generate dashboard chart and analytics
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python update_dashboard.py
      
      - name: Commit chart updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add district_chart_v2.png case_analytics.png union_distribution_chart.png README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update dashboard charts" && git push)
