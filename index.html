<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&E Advanced Enterprise Workspace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] } } }
        }
    </script>
    
    <script src="app.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f8fafc] text-[#1e293b] dark:bg-[#0b0f19] dark:text-[#f1f5f9] min-h-screen font-sans">

    <div id="loginGateway" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 dark:bg-[#060913]/80 backdrop-blur-md transition-all duration-500">
        <div class="w-full max-w-md p-8 rounded-3xl bg-white dark:bg-[#111827] border border-slate-200 dark:border-slate-800 shadow-2xl text-center">
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">AVCB M&E Enterprise Portal</h1>
            <p class="text-xs text-slate-400 mb-6">Authorize parameters using your verified corporate access profile.</p>
            
            <form id="login-form" onsubmit="handleUserLogin(event)" class="space-y-4 text-left">
                <input type="email" id="email" placeholder="officer@avcb-portal.org" required 
                       class="w-full p-3 border border-slate-300 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-blue-500 outline-none">
                <div id="auth-error" class="hidden text-sm text-red-600 bg-red-50 dark:bg-red-950/30 p-2 rounded"></div>
                <button type="submit" id="btn-login" class="w-full bg-blue-600 text-white p-3 rounded-xl font-semibold hover:bg-blue-700 transition">
                    Verify Identity & Enter Workspace
                </button>
            </form>
        </div>
    </div>

    <div id="mainDashboardApp" class="hidden opacity-0 transition-opacity duration-700 flex-1 flex flex-col w-full min-h-screen">
        <header class="bg-white dark:bg-[#111827] border-b border-slate-200 dark:border-slate-800 px-8 py-4 flex justify-between items-center shadow-sm">
            <span class="text-xl font-bold">DataView Dashboard</span>
            <div class="flex items-center gap-4">
                <button id="themeToggle" class="px-3 py-1.5 text-xs bg-slate-100 dark:bg-slate-800 rounded-full">🌓 Theme</button>
                <div class="flex items-center gap-3 border-l pl-4 dark:border-slate-800">
                    <div class="text-right">
                        <div id="displayUserName" class="text-xs font-bold">...</div>
                        <div id="displayUserRole" class="text-[10px] text-emerald-500 uppercase">...</div>
                    </div>
                    <div id="displayUserAvatar" class="h-8 w-8 rounded-full bg-emerald-500 text-white flex items-center justify-center text-xs">--</div>
                    <button onclick="executeSystemLogout()" class="text-xs bg-red-100 text-red-600 px-3 py-1.5 rounded-lg">Exit</button>
                </div>
            </div>
        </header>

        <main class="p-8 max-w-[1600px] mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div id="unsolved-list-container" class="lg:col-span-3"></div>
        </main>
    </div>

</body>
</html>
