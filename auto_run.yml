name: Auto-Update Dashboard

# Trigger conditions
on:
  # Trigger when Excel file is modified
  push:
    branches:
      - main
    paths:
      - 'NGO_Project_MNE_Dataset_2000.xlsx'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
  # Run daily at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl matplotlib python-dotenv python-dateutil
      
      # Step 4: Run the Python script to generate chart and sync data
      - name: Generate dashboard chart and analytics
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python update_dashboard.py
      
      # Step 5: Commit and push changes if files were updated
      - name: Commit chart updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add district_chart.png case_analytics.png union_distribution_chart.png
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update district chart and analytics" && git push)